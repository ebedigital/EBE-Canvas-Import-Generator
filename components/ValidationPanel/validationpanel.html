<section class="validation-card">

    <div class="validation-header">

        <h2>Validation Summary</h2>

    </div>

    

    <div class="validation-item success">

        <span class="label">

            <i class="bi bi-check-circle-fill"></i>

            Valid Teachers

        </span>

        <span id="validTeachers">0</span>

    </div>

    <div class="validation-item warning">

        <span class="label">

            <i class="bi bi-exclamation-triangle-fill"></i>

            Warnings

        </span>

        <span id="warnings">0</span>

    </div>

    <div class="validation-item error">

        <span class="label">

            <i class="bi bi-x-circle-fill"></i>

            Errors

        </span>

        <span id="errors">0</span>

    </div>

    <div class="validation-item email">

        <span class="label">

            <i class="bi bi-envelope-x-fill"></i>

            Invalid Emails

        </span>

        <span id="invalidEmails">0</span>

    </div>

    <div class="validation-item duplicate">

        <span class="label">

            <i class="bi bi-people-fill"></i>

            Duplicate Teachers

        </span>

        <span id="duplicateTeachers">0</span>

    </div>

    <button id="btnValidationDetails" class="details-btn">

        View Validation Details

    </button>

</section>
